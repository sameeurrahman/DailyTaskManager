<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Daily Task Manager</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>


<body>

    <div class="container">
        <div class="left-panel">
                <div id="dashboard">

                    <h3>Dashboard</h3>

                        <div class="dashboard-card">

                        <button id="calendarBtn">
                            📅 Calendar
                        </button>

                         <div class="date-navigation-bar">

                            <button id="prevDay">‹</button>

                            <span id="selectedDate">
                                    4 Jun 2026
                            </span>

                            <button id="nextDay">›</button>

                        </div>

                        </div>

                    <div class="dashboard-card">
                    
                    <div id="dashboardDate"></div>

                    <div id="dashboardGroups"></div>

                    <div id="dashboardTasks"></div>

                    <div id="dashboardTodo"></div>


                    <div id="dashboardGroupDetails"></div>

                    </div>

                    <div class="dashboard-card">

                    <div class="header-actions">

                        <button id="exportBtn">
                            Export Data
                        </button>

                        <button id="importBtn">
                            Import Data
                        </button>

                    </div>

                    </div>

                </div>
        </div>

       <div id="calendarPage">

    <h2>Calendar</h2>

                <div class="month-navigation">

                    <button id="prevMonth">
                    ◀
                    </button>

                    <h3 id="monthYear"></h3>

                    <button id="nextMonth">
                    ▶
                    </button>

                </div>

                <div class="weekdays">

                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>

                </div>

                <div id="calendar"></div>

</div>

                <div class="right-panel">

               <div class="page-header">

    <h1>Daily Task Manager</h1>
    </div>


                <button id="addGroupBtn">
                    + Add Group
                </button>
                
            

<span id="saveStatus">
    ✓ Saved
</span>

<input
    type="file"
    id="importFile"
    accept=".json"
    style="display:none"
>

                <div id="groupsContainer"></div>

    <script src="app.js"></script>

</body>
</html>
